<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 380" width="260" height="380">
  <defs>
    <radialGradient id="bg" cx="50%" cy="80%" r="60%"><stop offset="0%" stop-color="#180a04"/><stop offset="100%" stop-color="#0a0604"/></radialGradient>
    <radialGradient id="skin" cx="50%" cy="40%" r="50%"><stop offset="0%" stop-color="#9a6840"/><stop offset="100%" stop-color="#6a3820"/></radialGradient>
  </defs>
  <rect width="260" height="380" fill="url(#bg)"/>
  <!-- silueta de multitud atrás -->
  <ellipse cx="60" cy="340" rx="30" ry="15" fill="#1a0e06" opacity="0.5"/>
  <ellipse cx="200" cy="345" rx="25" ry="12" fill="#1a0e06" opacity="0.5"/>
  <ellipse cx="40" cy="320" rx="12" ry="25" fill="#1a0e06" opacity="0.4"/>
  <ellipse cx="220" cy="325" rx="10" ry="22" fill="#1a0e06" opacity="0.4"/>
  <!-- falda en movimiento -->
  <path d="M55 380 Q90 305 130 295 Q170 305 205 380Z" fill="#3a2010"/>
  <path d="M62 380 Q85 318 130 295" stroke="#2a1408" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- blusa -->
  <path d="M88 298 L92 212 Q130 196 168 212 L172 298 Q130 308 88 298Z" fill="#c8b890"/>
  <!-- brazo derecho alzando algo (antorcha / machete) -->
  <rect x="160" y="212" width="14" height="70" rx="6" fill="#c8b890" transform="rotate(-40 160 212)"/>
  <!-- herramienta aloft -->
  <rect x="195" y="145" width="6" height="60" rx="3" fill="#6a4020" transform="rotate(-40 160 212)"/>
  <!-- brazo izquierdo en movimiento -->
  <rect x="84" y="215" width="14" height="55" rx="6" fill="#c8b890" transform="rotate(20 84 215)"/>
  <!-- cabeza con pañuelo -->
  <ellipse cx="130" cy="174" rx="30" ry="35" fill="url(#skin)"/>
  <path d="M100 165 Q130 145 160 165 Q155 150 130 143 Q105 150 100 165Z" fill="#8a5030"/>
  <!-- pelo oscuro -->
  <path d="M98 165 Q93 178 95 192" stroke="#2a1406" stroke-width="3" fill="none"/>
  <!-- expresión determinada en marcha -->
  <ellipse cx="116" cy="177" rx="5" ry="5.5" fill="#1a0e06"/>
  <ellipse cx="144" cy="177" rx="5" ry="5.5" fill="#1a0e06"/>
  <circle cx="115" cy="175" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="143" cy="175" r="1.5" fill="#fff" opacity="0.7"/>
  <path d="M108 168 Q116 165 124 168" stroke="#2a1006" stroke-width="1.6" fill="none"/>
  <path d="M136 168 Q144 165 152 168" stroke="#2a1006" stroke-width="1.6" fill="none"/>
  <path d="M120 196 Q130 200 140 196" stroke="#6a3020" stroke-width="1.5" fill="none"/>
  <!-- polvo del camino -->
  <ellipse cx="130" cy="360" rx="80" ry="12" fill="rgba(180,120,60,0.08)"/>
</svg>
