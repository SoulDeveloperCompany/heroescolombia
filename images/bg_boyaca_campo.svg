    <linearGradient id="campo" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1808"/><stop offset="100%" stop-color="#0d0e06"/></linearGradient>
  </defs>
  <rect width="480" height="844" fill="url(#sky)"/>
