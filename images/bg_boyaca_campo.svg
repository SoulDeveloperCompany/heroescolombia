  <rect x="215" y="555" width="6" height="30" fill="#2a1a08"/>
  <rect x="235" y="555" width="6" height="30" fill="#2a1a08"/>
  <rect x="255" y="555" width="6" height="30" fill="#2a1a08"/>
  <rect x="275" y="555" width="6" height="30" fill="#2a1a08"/>
