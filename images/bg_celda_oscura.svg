<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 844" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="celdaLight" cx="50%" cy="20%" r="35%">
      <stop offset="0%" stop-color="#3a5070" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="stoneWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#050709"/>
    </linearGradient>
  </defs>
  <rect width="480" height="844" fill="url(#stoneWall)"/>
  <!-- Bloques de piedra -->
  <g stroke="#0f1520" stroke-width="1.5" fill="none" opacity="0.6">
    <!-- Fila 1 -->
    <rect x="0" y="0" width="120" height="55"/>
    <rect x="120" y="0" width="140" height="55"/>
    <rect x="260" y="0" width="110" height="55"/>
    <rect x="370" y="0" width="110" height="55"/>
    <!-- Fila 2 (desplazada) -->
    <rect x="-30" y="55" width="130" height="55"/>
    <rect x="100" y="55" width="110" height="55"/>
    <rect x="210" y="55" width="130" height="55"/>
    <rect x="340" y="55" width="140" height="55"/>
    <!-- Más filas -->
    <rect x="0" y="110" width="120" height="55"/>
    <rect x="120" y="110" width="140" height="55"/>
    <rect x="260" y="110" width="100" height="55"/>
    <rect x="360" y="110" width="120" height="55"/>
    <rect x="-20" y="165" width="130" height="55"/>
    <rect x="110" y="165" width="110" height="55"/>
    <rect x="220" y="165" width="130" height="55"/>
    <rect x="350" y="165" width="130" height="55"/>
  </g>
  <!-- Ventana con barrotes -->
  <rect x="160" y="60" width="160" height="200" fill="#0c1830" opacity="0.8" rx="4"/>
  <!-- Luz fría exterior -->
  <rect x="164" y="64" width="152" height="192" fill="#2a4a6a" opacity="0.12"/>
  <!-- Barrotes verticales -->
  <g fill="#0a0c10">
    <rect x="190" y="60" width="8" height="200"/>
    <rect x="218" y="60" width="8" height="200"/>
    <rect x="246" y="60" width="8" height="200"/>
    <rect x="274" y="60" width="8" height="200"/>
    <rect x="302" y="60" width="8" height="200"/>
  </g>
  <!-- Barrote horizontal -->
  <rect x="160" y="155" width="160" height="8" fill="#0a0c10"/>
  <!-- Marco ventana -->
  <rect x="154" y="54" width="172" height="10" fill="#0f1520"/>
  <rect x="154" y="54" width="10" height="210" fill="#0f1520"/>
  <rect x="316" y="54" width="10" height="210" fill="#0f1520"/>
  <rect x="154" y="258" width="172" height="10" fill="#0f1520"/>
  <!-- Suelo piedra -->
  <rect x="0" y="680" width="480" height="164" fill="#080b10"/>
  <g stroke="#0f1520" stroke-width="1" fill="none" opacity="0.5">
    <rect x="0" y="690" width="90" height="60"/>
    <rect x="90" y="690" width="100" height="60"/>
    <rect x="190" y="690" width="95" height="60"/>
    <rect x="285" y="690" width="105" height="60"/>
    <rect x="390" y="690" width="90" height="60"/>
    <rect x="0" y="750" width="80" height="94"/>
    <rect x="80" y="750" width="110" height="94"/>
    <rect x="190" y="750" width="90" height="94"/>
    <rect x="280" y="750" width="100" height="94"/>
    <rect x="380" y="750" width="100" height="94"/>
  </g>
  <!-- Humedad en pared -->
  <g fill="#0a1520" opacity="0.3">
    <ellipse cx="80" cy="300" rx="30" ry="60"/>
    <ellipse cx="400" cy="350" rx="25" ry="50"/>
    <ellipse cx="200" cy="450" rx="20" ry="40"/>
  </g>
  <!-- Luz de ventana -->
  <rect width="480" height="844" fill="url(#celdaLight)"/>
  <!-- Oscuridad en bordes -->
  <radialGradient id="darkEdge" cx="50%" cy="50%" r="60%">
    <stop offset="40%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#050709" stop-opacity="0.85"/>
  </radialGradient>
  <rect width="480" height="844" fill="url(#darkEdge)"/>
</svg>
