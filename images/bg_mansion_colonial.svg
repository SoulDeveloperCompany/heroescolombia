<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 844" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="salonLight" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#8a5018" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#3a1e08" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0e06"/>
      <stop offset="100%" stop-color="#0d0704"/>
    </linearGradient>
    <linearGradient id="woodFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1508"/>
      <stop offset="100%" stop-color="#180d04"/>
    </linearGradient>
  </defs>
  <!-- Paredes -->
  <rect width="480" height="844" fill="url(#wallGrad)"/>
  <!-- Piso de madera -->
  <rect x="0" y="620" width="480" height="224" fill="url(#woodFloor)"/>
  <!-- Vetas madera -->
  <g stroke="#3a1a08" stroke-width="1.5" opacity="0.4">
    <line x1="0" y1="640" x2="480" y2="640"/>
    <line x1="0" y1="660" x2="480" y2="660"/>
    <line x1="0" y1="680" x2="480" y2="680"/>
    <line x1="0" y1="700" x2="480" y2="700"/>
    <line x1="0" y1="720" x2="480" y2="720"/>
    <line x1="0" y1="740" x2="480" y2="740"/>
    <line x1="0" y1="760" x2="480" y2="760"/>
  </g>
  <!-- Moldura pared-piso -->
  <rect x="0" y="616" width="480" height="8" fill="#4a2810"/>
  <!-- Vigas del techo -->
  <g fill="#0a0603" opacity="0.9">
    <rect x="0" y="0" width="480" height="60"/>
    <rect x="30" y="0" width="28" height="120"/>
    <rect x="120" y="0" width="28" height="120"/>
    <rect x="210" y="0" width="28" height="120"/>
    <rect x="300" y="0" width="28" height="120"/>
    <rect x="390" y="0" width="28" height="120"/>
  </g>
  <!-- Ventana grande con luz -->
  <g>
    <rect x="160" y="100" width="160" height="240" fill="#4a3010" opacity="0.7"/>
    <rect x="164" y="104" width="72" height="232" fill="#c8780a" opacity="0.12"/>
    <rect x="240" y="104" width="76" height="232" fill="#c8780a" opacity="0.10"/>
    <!-- Marco ventana -->
    <rect x="156" y="96" width="168" height="8" fill="#2a1508"/>
    <rect x="156" y="96" width="8" height="250" fill="#2a1508"/>
    <rect x="316" y="96" width="8" height="250" fill="#2a1508"/>
    <rect x="156" y="340" width="168" height="8" fill="#2a1508"/>
    <rect x="232" y="96" width="8" height="250" fill="#2a1508"/><!-- parteluz -->
    <!-- Luz que entra -->
    <polygon points="164,104 240,200 164,340" fill="#c8780a" opacity="0.06"/>
    <polygon points="316,104 240,200 316,340" fill="#c8780a" opacity="0.05"/>
  </g>
  <!-- Escritorio -->
  <rect x="270" y="490" width="180" height="130" fill="#2a1508" rx="3"/>
  <rect x="268" y="485" width="184" height="12" fill="#3a1e0a" rx="2"/>
  <!-- Papeles en escritorio -->
  <rect x="290" y="470" width="70" height="20" fill="#f0e0c0" opacity="0.7" transform="rotate(-5, 325, 480)"/>
  <rect x="310" y="468" width="70" height="20" fill="#e8d8b0" opacity="0.6" transform="rotate(3, 345, 478)"/>
  <!-- Vela -->
  <rect x="410" y="440" width="8" height="50" fill="#f5ecd7" opacity="0.8"/>
  <ellipse cx="414" cy="435" rx="4" ry="8" fill="#f5a020" opacity="0.9"/>
  <!-- Luz general salón -->
  <rect width="480" height="844" fill="url(#salonLight)"/>
</svg>
