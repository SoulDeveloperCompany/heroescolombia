    <linearGradient id="mont" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1f28"/><stop offset="100%" stop-color="#0d1018"/></linearGradient>
  </defs>
  <rect width="480" height="844" fill="url(#sky)"/>
