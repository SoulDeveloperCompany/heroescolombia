<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 844" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="execSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="50%" stop-color="#2a1a10"/>
      <stop offset="100%" stop-color="#0d0a07"/>
    </linearGradient>
    <radialGradient id="execLight" cx="50%" cy="28%" r="45%">
      <stop offset="0%" stop-color="#c8900a" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#6a3808" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Cielo plomizo mañana -->
  <rect width="480" height="844" fill="url(#execSky)"/>
  <!-- Nubes grises -->
  <g fill="#251a12" opacity="0.7">
    <ellipse cx="120" cy="80" rx="100" ry="35"/>
    <ellipse cx="340" cy="60" rx="120" ry="30"/>
    <ellipse cx="240" cy="100" rx="90" ry="28"/>
    <ellipse cx="60" cy="110" rx="70" ry="22"/>
    <ellipse cx="420" cy="95" rx="80" ry="25"/>
  </g>
  <!-- Silhouette ciudad colonial al fondo -->
  <g fill="#0d0a07" opacity="0.9">
    <!-- Edificios fondo -->
    <rect x="0" y="300" width="80" height="280"/>
    <polygon points="0,300 40,265 80,300"/>
    <rect x="85" y="340" width="65" height="240"/>
    <polygon points="85,340 117,305 150,340"/>
    <rect x="310" y="320" width="75" height="260"/>
    <polygon points="310,320 347,280 385,320"/>
    <rect x="395" y="350" width="85" height="230"/>
    <!-- Torre catedral izquierda -->
    <rect x="150" y="210" width="35" height="370"/>
    <polygon points="150,210 167,170 185,210"/>
    <rect x="158" y="178" width="6" height="12"/>
    <rect x="163" y="165" width="4" height="17"/>
    <rect x="160" y="170" width="10" height="4"/>
    <!-- Torre catedral derecha -->
    <rect x="295" y="230" width="30" height="350"/>
    <polygon points="295,230 310,192 325,230"/>
    <rect x="302" y="200" width="5" height="11"/>
    <rect x="307" y="188" width="3" height="15"/>
    <rect x="304" y="193" width="9" height="4"/>
  </g>
  <!-- Plaza empedrada -->
  <rect x="0" y="580" width="480" height="264" fill="#120e0a"/>
  <g stroke="#1a1410" stroke-width="1" fill="none" opacity="0.55">
    <line x1="0" y1="600" x2="480" y2="600"/>
    <line x1="0" y1="620" x2="480" y2="620"/>
    <line x1="0" y1="640" x2="480" y2="640"/>
    <line x1="0" y1="660" x2="480" y2="660"/>
    <line x1="0" y1="680" x2="480" y2="680"/>
    <line x1="0" y1="700" x2="480" y2="700"/>
    <line x1="60" y1="580" x2="90" y2="844"/>
    <line x1="160" y1="580" x2="200" y2="844"/>
    <line x1="240" y1="580" x2="240" y2="844"/>
    <line x1="320" y1="580" x2="280" y2="844"/>
    <line x1="420" y1="580" x2="390" y2="844"/>
  </g>
  <!-- Siluetas soldados -->
  <g fill="#0a0806" opacity="0.85">
    <rect x="20" y="520" width="14" height="65"/>
    <ellipse cx="27" cy="515" rx="9" ry="10"/>
    <!-- Fusil soldado izquierdo -->
    <rect x="33" y="490" width="3" height="50" transform="rotate(-15, 34, 515)"/>
    <rect x="40" y="530" width="14" height="60"/>
    <ellipse cx="47" cy="525" rx="9" ry="10"/>
    <rect x="400" y="520" width="14" height="65"/>
    <ellipse cx="407" cy="515" rx="9" ry="10"/>
    <rect x="420" y="525" width="14" height="60"/>
    <ellipse cx="427" cy="520" rx="9" ry="10"/>
    <!-- Fusil -->
    <rect x="434" y="490" width="3" height="50" transform="rotate(12, 435, 515)"/>
  </g>
  <!-- Luz del alba -->
  <rect width="480" height="844" fill="url(#execLight)"/>
  <!-- Vignette dramática -->
  <radialGradient id="execVignette" cx="50%" cy="50%" r="60%">
    <stop offset="30%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#050403" stop-opacity="0.9"/>
  </radialGradient>
  <rect width="480" height="844" fill="url(#execVignette)"/>
</svg>
