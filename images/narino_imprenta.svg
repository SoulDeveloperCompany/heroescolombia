  <rect x="155" y="240" width="55" height="72" rx="3" fill="#f0e4c0" transform="rotate(8 155 240)"/>
  <line x1="162" y1="252" x2="200" y2="252" stroke="#4a3010" stroke-width="0.8" opacity="0.5" transform="rotate(8 155 240)"/>
  <line x1="162" y1="260" x2="200" y2="260" stroke="#4a3010" stroke-width="0.8" opacity="0.5" transform="rotate(8 155 240)"/>
  <line x1="162" y1="268" x2="200" y2="268" stroke="#4a3010" stroke-width="0.8" opacity="0.5" transform="rotate(8 155 240)"/>
  <!-- cabeza mirando la hoja -->
  <ellipse cx="130" cy="175" rx="30" ry="35" fill="url(#skin)"/>
  <path d="M100 167 Q130 146 160 167 L160 155 Q130 143 100 155Z" fill="#2a1a0a"/>
  <!-- expresión de concentración urgente -->
  <ellipse cx="116" cy="178" rx="5" ry="5.5" fill="#1a1006"/>
  <ellipse cx="144" cy="178" rx="5" ry="5.5" fill="#1a1006"/>
  <circle cx="115" cy="176" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="143" cy="176" r="1.5" fill="#fff" opacity="0.6"/>
  <path d="M110 171 L120 168" stroke="#2a1006" stroke-width="1.3"/>
  <path d="M140 168 L150 171" stroke="#2a1006" stroke-width="1.3"/>
  <path d="M128 196 Q130 199 132 196" stroke="#5a2a10" stroke-width="1.2" fill="none"/>
  <!-- tinta en la mano izquierda -->
  <ellipse cx="76" cy="277" rx="9" ry="5" fill="#0a0808" opacity="0.7"/>
  <!-- resplandor de vela -->
  <ellipse cx="155" cy="260" rx="45" ry="55" fill="rgba(212,160,60,0.05)"/>
