<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 380" preserveAspectRatio="xMidYMax meet">
  <defs>
    <radialGradient id="skin7" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#5a3520"/>
      <stop offset="100%" stop-color="#3d2214"/>
    </radialGradient>
    <linearGradient id="dress7" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0%" stop-color="#2a1a0e"/>
      <stop offset="100%" stop-color="#140c04"/>
    </linearGradient>
  </defs>
  <!-- Falda en movimiento (ligeramente inclinada al caminar) -->
  <path d="M 65 178 Q 38 240 30 380 L 230 380 Q 235 245 208 180 Q 170 162 132 160 Q 98 160 65 178 Z" fill="url(#dress7)"/>
  <!-- Vuelo de la falda al caminar -->
  <path d="M 30 380 Q 35 310 50 260 Q 42 290 38 340 Z" fill="#1e1208" opacity="0.6"/>
  <!-- Pliegues de movimiento -->
  <path d="M 88 195 Q 78 272 68 380" stroke="#1a0e06" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M 130 165 Q 135 272 138 380" stroke="#1a0e06" stroke-width="1.5" fill="none" opacity="0.35"/>
  <path d="M 175 195 Q 190 272 202 380" stroke="#1a0e06" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Corpiño -->
  <path d="M 82 128 Q 76 162 65 178 Q 98 160 132 160 Q 170 162 208 180 Q 192 162 184 128 Q 163 106 132 104 Q 102 104 82 128 Z" fill="#1e1208"/>
  <!-- Chal (en movimiento, flotando levemente) -->
  <path d="M 76 115 Q 44 148 38 200 Q 50 185 65 172 Q 71 140 83 122 Z" fill="#2a1a0e" opacity="0.85"/>
  <path d="M 188 115 Q 218 145 222 198 Q 210 183 196 170 Q 190 138 180 122 Z" fill="#2a1a0e" opacity="0.85"/>
  <!-- Borde del chal flotando -->
  <path d="M 38 200 Q 32 210 28 220" stroke="#2a1a0e" stroke-width="8" fill="none" opacity="0.6" stroke-linecap="round"/>
  <!-- Cuello -->
  <path d="M 110 104 Q 132 115 154 104 L 150 96 Q 132 107 114 96 Z" fill="#2a1a0e"/>
  <!-- Cabeza (ligeramente girada, alerta) -->
  <g transform="rotate(-3, 132, 73)">
    <ellipse cx="132" cy="73" rx="31" ry="36" fill="url(#skin7)"/>
    <!-- Tocado -->
    <path d="M 101 58 Q 106 38 132 34 Q 158 38 163 58 Q 155 47 132 45 Q 109 47 101 58 Z" fill="#1a1008"/>
    <path d="M 99 62 Q 95 55 93 67 Q 99 57 101 65 Z" fill="#1a1008"/>
    <path d="M 165 62 Q 169 55 171 67 Q 165 57 163 65 Z" fill="#1a1008"/>
    <!-- Ojos (mirando a un lado, alerta) -->
    <ellipse cx="118" cy="74" rx="5.5" ry="3.8" fill="#1a0e06"/>
    <ellipse cx="146" cy="74" rx="5.5" ry="3.8" fill="#1a0e06"/>
    <circle cx="120" cy="73" r="1.8" fill="#3d2a1a"/>
    <circle cx="148" cy="73" r="1.8" fill="#3d2a1a"/>
    <!-- Nariz -->
    <path d="M 128 84 Q 132 89 136 84" stroke="#2a1508" stroke-width="1" fill="none"/>
    <!-- Boca (seria, discreta) -->
    <path d="M 122 95 Q 132 97 142 95" stroke="#3d2214" stroke-width="1.5" fill="none"/>
  </g>
  <!-- Brazo adelante (caminando) -->
  <path d="M 192 135 Q 210 152 215 172 Q 206 176 200 156 Q 192 142 183 128 Z" fill="url(#skin7)"/>
  <!-- Brazo atrás (caminando) -->
  <path d="M 72 135 Q 55 155 50 175 Q 60 178 65 160 Q 74 145 82 128 Z" fill="url(#skin7)"/>
  <!-- Cesta con telas -->
  <ellipse cx="54" cy="179" rx="18" ry="11" fill="#3a2010"/>
  <path d="M 38 179 Q 54 166 70 179" stroke="#4a2a14" stroke-width="2.5" fill="none"/>
  <!-- Telas sobresaliendo de cesta -->
  <path d="M 44 172 Q 54 165 64 172 Q 58 160 54 158 Q 50 160 44 172 Z" fill="#2a1508" opacity="0.7"/>
</svg>
