<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 380" preserveAspectRatio="xMidYMax meet">
  <defs>
    <radialGradient id="skinTone" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#5a3520"/>
      <stop offset="100%" stop-color="#3d2214"/>
    </radialGradient>
    <linearGradient id="dressGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#2a1a0e"/>
      <stop offset="60%" stop-color="#1e1208"/>
      <stop offset="100%" stop-color="#140c04"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8780a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Aura suave -->
  <ellipse cx="130" cy="320" rx="110" ry="90" fill="url(#aura)"/>
  <!-- Falda colonial (amplia, con volumen) -->
  <path d="M 60 180 Q 30 240 20 380 L 240 380 Q 230 240 200 180 Q 165 165 130 165 Q 95 165 60 180 Z" fill="url(#dressGrad)"/>
  <!-- Pliegues falda -->
  <path d="M 85 200 Q 75 280 65 380" stroke="#1a0e06" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 130 175 Q 128 280 125 380" stroke="#1a0e06" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M 175 200 Q 185 280 195 380" stroke="#1a0e06" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Corpiño -->
  <path d="M 80 130 Q 75 165 60 180 Q 95 165 130 165 Q 165 165 200 180 Q 185 165 180 130 Q 160 110 130 108 Q 100 108 80 130 Z" fill="#1e1208"/>
  <!-- Cuello / escote modesto -->
  <path d="M 108 108 Q 130 118 152 108 L 148 100 Q 130 108 112 100 Z" fill="#2a1a0e"/>
  <!-- Chal / reboso -->
  <path d="M 75 120 Q 50 150 45 200 Q 55 185 70 175 Q 75 145 85 130 Z" fill="#2a1a0e" opacity="0.8"/>
  <path d="M 185 120 Q 210 150 215 200 Q 205 185 190 175 Q 185 145 175 130 Z" fill="#2a1a0e" opacity="0.8"/>
  <!-- Cabeza -->
  <ellipse cx="130" cy="78" rx="32" ry="38" fill="url(#skinTone)"/>
  <!-- Tocado / pañoleta colonial -->
  <path d="M 98 62 Q 100 42 130 38 Q 160 42 162 62 Q 155 50 130 48 Q 105 50 98 62 Z" fill="#1a1008"/>
  <path d="M 96 65 Q 92 58 90 70 Q 96 60 98 68 Z" fill="#1a1008"/>
  <path d="M 164 65 Q 168 58 170 70 Q 164 60 162 68 Z" fill="#1a1008"/>
  <!-- Ojos (mirando hacia abajo, cosiendo) -->
  <ellipse cx="117" cy="80" rx="5" ry="3.5" fill="#1a0e06"/>
  <ellipse cx="143" cy="80" rx="5" ry="3.5" fill="#1a0e06"/>
  <!-- Párpados bajos -->
  <path d="M 112 78 Q 117 82 122 78" stroke="#1a0e06" stroke-width="1.5" fill="none"/>
  <path d="M 138 78 Q 143 82 148 78" stroke="#1a0e06" stroke-width="1.5" fill="none"/>
  <!-- Nariz -->
  <path d="M 127 88 Q 130 93 133 88" stroke="#2a1508" stroke-width="1" fill="none"/>
  <!-- Boca (concentrada, cerrada) -->
  <path d="M 122 98 Q 130 100 138 98" stroke="#3d2214" stroke-width="1.5" fill="none"/>
  <!-- Brazo derecho (cosiendo, hacia abajo) -->
  <path d="M 185 140 Q 200 155 210 170 Q 205 175 195 165 Q 188 150 178 138 Z" fill="url(#skinTone)"/>
  <!-- Mano derecha con aguja -->
  <ellipse cx="207" cy="173" rx="9" ry="7" fill="url(#skinTone)"/>
  <line x1="210" y1="168" x2="220" y2="155" stroke="#c8c0a8" stroke-width="1.5" opacity="0.8"/>
  <!-- Brazo izquierdo (sosteniendo tela) -->
  <path d="M 75 140 Q 60 158 55 175 Q 63 178 72 165 Q 75 150 82 138 Z" fill="url(#skinTone)"/>
  <!-- Tela en regazo -->
  <ellipse cx="130" cy="185" rx="55" ry="20" fill="#3a2810" opacity="0.7"/>
  <path d="M 80 180 Q 130 195 180 180 Q 175 190 130 195 Q 85 190 80 180 Z" fill="#2a1e10" opacity="0.5"/>
  <!-- Hilo (sutil) -->
  <path d="M 210 165 Q 200 190 175 185 Q 155 183 140 185" stroke="#d4943a" stroke-width="0.8" fill="none" opacity="0.6"/>
</svg>
