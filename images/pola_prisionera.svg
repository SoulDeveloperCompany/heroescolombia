<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 380" preserveAspectRatio="xMidYMax meet">
  <defs>
    <radialGradient id="skin5" cx="48%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#4a2e1a"/>
      <stop offset="100%" stop-color="#321a0c"/>
    </radialGradient>
    <linearGradient id="dress5" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1e1408"/>
      <stop offset="100%" stop-color="#100a04"/>
    </linearGradient>
  </defs>
  <!-- Falda (más ajustada, prisionera) -->
  <path d="M 72 182 Q 50 245 42 380 L 218 380 Q 210 245 188 182 Q 158 168 130 168 Q 102 168 72 182 Z" fill="url(#dress5)"/>
  <path d="M 92 200 Q 84 278 75 380" stroke="#140c04" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M 130 172 Q 129 278 128 380" stroke="#140c04" stroke-width="1.2" fill="none" opacity="0.3"/>
  <path d="M 168 200 Q 176 278 185 380" stroke="#140c04" stroke-width="1.2" fill="none" opacity="0.4"/>
  <!-- Corpiño -->
  <path d="M 88 135 Q 82 168 72 182 Q 102 168 130 168 Q 158 168 188 182 Q 178 168 172 135 Q 155 116 130 114 Q 105 114 88 135 Z" fill="#1a1006"/>
  <!-- Sin chal (despojada) -->
  <!-- Cuello -->
  <path d="M 110 114 Q 130 124 150 114 L 146 106 Q 130 115 114 106 Z" fill="#1a1006"/>
  <!-- Cabeza (ligeramente inclinada hacia abajo) -->
  <g transform="rotate(6, 130, 78)">
    <ellipse cx="130" cy="78" rx="30" ry="36" fill="url(#skin5)"/>
    <!-- Cabello suelto (sin tocado, desaliñada) -->
    <path d="M 100 65 Q 96 48 102 38 Q 116 28 130 30 Q 144 28 158 38 Q 164 48 160 65" fill="#1a0c04"/>
    <!-- Mechones sueltos -->
    <path d="M 100 65 Q 92 80 88 100 Q 95 95 100 78 Z" fill="#1a0c04"/>
    <path d="M 160 65 Q 168 80 172 100 Q 165 95 160 78 Z" fill="#1a0c04"/>
    <path d="M 98 70 Q 90 60 92 50" stroke="#2a1008" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- Cejas (cansancio, sufrimiento) -->
    <path d="M 108 68 Q 115 65 122 67" stroke="#1a0e06" stroke-width="1.8" fill="none"/>
    <path d="M 138 67 Q 145 65 152 68" stroke="#1a0e06" stroke-width="1.8" fill="none"/>
    <!-- Ojos (cansados, pero firmes) -->
    <ellipse cx="116" cy="79" rx="5" ry="3.8" fill="#1a0e06"/>
    <ellipse cx="144" cy="79" rx="5" ry="3.8" fill="#1a0e06"/>
    <circle cx="116" cy="78" r="1.5" fill="#3d2a1a"/>
    <circle cx="144" cy="78" r="1.5" fill="#3d2a1a"/>
    <!-- Ojeras suaves -->
    <ellipse cx="116" cy="83" rx="6" ry="2" fill="#2a1508" opacity="0.3"/>
    <ellipse cx="144" cy="83" rx="6" ry="2" fill="#2a1508" opacity="0.3"/>
    <!-- Nariz -->
    <path d="M 126 89 Q 130 94 134 89" stroke="#2a1508" stroke-width="1" fill="none"/>
    <!-- Boca (apretada, dignidad en adversidad) -->
    <path d="M 120 100 Q 130 103 140 100" stroke="#3a1e10" stroke-width="1.5" fill="none"/>
  </g>
  <!-- Brazos cruzados (postura defensiva/digna) -->
  <!-- Brazo derecho cruzado -->
  <path d="M 178 145 Q 195 158 200 175 Q 185 188 165 175 Q 145 162 130 172" stroke="url(#skin5)" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Brazo izquierdo cruzado -->
  <path d="M 82 145 Q 65 158 60 175 Q 78 190 100 178 Q 118 165 130 172" stroke="url(#skin5)" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Manos cruzadas -->
  <ellipse cx="130" cy="174" rx="22" ry="13" fill="url(#skin5)"/>
</svg>
