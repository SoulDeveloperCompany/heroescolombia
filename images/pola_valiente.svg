  <path d="M 75 130 Q 60 152 56 174 Q 65 177 70 156 Q 77 141 83 124 Z" fill="url(#skin6)"/>
  <ellipse cx="57" cy="177" rx="9" ry="8" fill="url(#skin6)"/>
