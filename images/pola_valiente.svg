  <path d="M 122 89 Q 130 94 138 89 Q 130 96 122 89 Z" fill="#2a1208" opacity="0.5"/>
  <!-- Brazo levantado (gesto de discurso / desafío) -->
  <!-- Brazo derecho levantado -->
  <path d="M 185 128 Q 205 100 212 72 Q 202 68 196 94 Q 188 118 178 126 Z" fill="url(#skin6)"/>
  <!-- Mano derecha levantada (puño / gesto) -->
