  <path d="M 96 54 Q 88 40 90 28 Q 94 38 96 54 Z" fill="#1a1008"/>
  <path d="M 164 54 Q 172 40 170 28 Q 166 38 164 54 Z" fill="#1a1008"/>
  <path d="M 94 57 Q 90 50 88 62 Q 94 52 96 60 Z" fill="#1a1008"/>
  <path d="M 166 57 Q 170 50 172 62 Q 166 52 164 60 Z" fill="#1a1008"/>
