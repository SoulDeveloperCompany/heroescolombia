  <ellipse cx="116" cy="67" rx="6.5" ry="5" fill="#1a0e06"/>
  <ellipse cx="144" cy="67" rx="6.5" ry="5" fill="#1a0e06"/>
  <circle cx="116" cy="66" r="2.5" fill="#4a3020"/>
  <circle cx="144" cy="66" r="2.5" fill="#4a3020"/>
  <!-- Destellos en ojos (valentía) -->
  <circle cx="118" cy="64.5" r="1.2" fill="#d4943a" opacity="0.7"/>
  <circle cx="146" cy="64.5" r="1.2" fill="#d4943a" opacity="0.7"/>
  <!-- Nariz -->
  <path d="M 126 77 Q 130 82 134 77" stroke="#2a1508" stroke-width="1.2" fill="none"/>
