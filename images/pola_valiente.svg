  <path d="M 106 56 Q 115 52 123 55" stroke="#1a0e06" stroke-width="2.5" fill="none"/>
  <path d="M 137 55 Q 145 52 154 56" stroke="#1a0e06" stroke-width="2.5" fill="none"/>
