  <rect x="205" y="58" width="6" height="10" fill="url(#skin6)" rx="2"/>
  <rect x="213" y="56" width="6" height="12" fill="url(#skin6)" rx="2"/>
  <rect x="207" y="55" width="6" height="11" fill="url(#skin6)" rx="2"/>
