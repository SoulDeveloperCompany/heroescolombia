<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 380" preserveAspectRatio="xMidYMax meet">
  <defs>
    <radialGradient id="skin6" cx="45%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#5a3520"/>
      <stop offset="100%" stop-color="#3d2214"/>
    </radialGradient>
    <linearGradient id="dress6" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#2a1a0e"/>
      <stop offset="100%" stop-color="#140c04"/>
    </linearGradient>
    <radialGradient id="aura6" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d4943a" stop-opacity="0.28"/>
      <stop offset="50%" stop-color="#a05010" stop-opacity="0.1"/>
