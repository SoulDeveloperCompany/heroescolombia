<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 380" width="260" height="380">
  <defs>
    <radialGradient id="bg" cx="50%" cy="80%" r="60%"><stop offset="0%" stop-color="#08101a"/><stop offset="100%" stop-color="#060809"/></radialGradient>
    <radialGradient id="skin" cx="50%" cy="40%" r="50%"><stop offset="0%" stop-color="#8a6040"/><stop offset="100%" stop-color="#5a3820"/></radialGradient>
  </defs>
  <rect width="260" height="380" fill="url(#bg)"/>
  <!-- cuerpo — traje de estadista oscuro -->
  <path d="M82 380 L90 222 Q130 206 170 222 L178 380Z" fill="#1a1c24"/>
  <!-- camisa blanca y corbatín -->
  <path d="M108 226 Q130 218 152 226 L150 260 Q130 265 110 260Z" fill="#e8e0d0"/>
  <path d="M124 226 L130 238 L136 226 L130 220Z" fill="#fff"/>
  <!-- chaleco azul oscuro -->
  <path d="M108 260 Q130 265 152 260 L154 295 Q130 300 106 295Z" fill="#2a3040"/>
  <!-- frac / sobretodo negro de funcionario -->
  <path d="M82 380 L90 222 L100 226 L98 380Z" fill="#14161e"/>
  <path d="M178 380 L170 222 L160 226 L162 380Z" fill="#14161e"/>
  <!-- brazo derecho sosteniendo documento -->
  <rect x="160" y="220" width="16" height="60" rx="7" fill="#1a1c24"/>
  <!-- decreto / documento oficial -->
  <rect x="165" y="258" width="58" height="80" rx="3" fill="#f0e4c0"/>
  <line x1="172" y1="270" x2="215" y2="270" stroke="#5a4010" stroke-width="0.8" opacity="0.5"/>
  <line x1="172" y1="278" x2="215" y2="278" stroke="#5a4010" stroke-width="0.8" opacity="0.5"/>
  <line x1="172" y1="286" x2="215" y2="286" stroke="#5a4010" stroke-width="0.8" opacity="0.5"/>
  <line x1="172" y1="294" x2="208" y2="294" stroke="#5a4010" stroke-width="0.8" opacity="0.5"/>
  <!-- sello oficial -->
  <circle cx="198" cy="325" r="10" fill="none" stroke="#c04020" stroke-width="1.5"/>
  <circle cx="198" cy="325" r="7" fill="rgba(192,64,32,0.2)"/>
  <!-- brazo izquierdo en descanso -->
  <rect x="84" y="220" width="16" height="55" rx="7" fill="#1a1c24"/>
  <!-- cabeza serena y autoritaria -->
  <ellipse cx="130" cy="175" rx="31" ry="37" fill="url(#skin)"/>
  <!-- pelo corto ordenado -->
  <path d="M99 168 Q130 148 161 168 L161 156 Q130 144 99 156Z" fill="#1e1206"/>
  <!-- patillas levemente marcadas -->
  <path d="M99 168 Q96 182 98 196" stroke="#1e1206" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M161 168 Q164 182 162 196" stroke="#1e1206" stroke-width="3" fill="none" opacity="0.6"/>
  <!-- ojos serenos pero firmes -->
  <ellipse cx="116" cy="179" rx="5.5" ry="6" fill="#1a1006"/>
  <ellipse cx="144" cy="179" rx="5.5" ry="6" fill="#1a1006"/>
  <circle cx="115" cy="177" r="1.8" fill="#fff" opacity="0.55"/>
  <circle cx="143" cy="177" r="1.8" fill="#fff" opacity="0.55"/>
  <!-- cejas ordenadas -->
  <path d="M110 171 Q116 168 123 171" stroke="#2a1a06" stroke-width="1.3" fill="none"/>
  <path d="M137 171 Q144 168 150 171" stroke="#2a1a06" stroke-width="1.3" fill="none"/>
  <!-- nariz fina -->
  <path d="M128 187 Q130 195 132 187" stroke="#4a2a10" stroke-width="1" fill="none"/>
  <!-- boca firme — ni sonrisa ni fruncimiento -->
  <path d="M120 200 Q130 202 140 200" stroke="#5a3020" stroke-width="1.5" fill="none"/>
  <!-- aura azul de la ley -->
  <ellipse cx="130" cy="200" rx="60" ry="80" fill="rgba(40,60,120,0.04)"/>
</svg>
